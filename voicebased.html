<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoxNote v2 — Voice Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DESIGN TOKENS — Warm Light Theme
    ============================================================ */
    :root {
      --bg:       #f0f4ff;
      --surface:  #ffffff;
      --card:     #ffffff;
      --border:   #dde3f5;
      --accent:   #5b6ef5;
      --accent2:  #e85b8a;
      --danger:   #f04040;
      --success:  #22c97a;
      --text:     #1e2140;
      --muted:    #8890b0;
      --font-h:   'Syne', sans-serif;
      --font-m:   'DM Mono', monospace;
      --r:        12px;
      --rl:       20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-m);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Beautiful gradient mesh background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(91,110,245,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 10%,  rgba(232,91,138,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 50% 100%, rgba(91,110,245,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%,  rgba(91,220,245,0.10) 0%, transparent 50%),
        linear-gradient(135deg, #eef1ff 0%, #f5f0ff 40%, #fff0f7 100%);
      pointer-events: none; z-index: 0;
    }

    /* Soft floating circles decoration */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle 320px at 5% 20%,  rgba(91,110,245,0.07) 0%, transparent 70%),
        radial-gradient(circle 250px at 95% 75%, rgba(232,91,138,0.07) 0%, transparent 70%),
        radial-gradient(circle 200px at 60% 10%, rgba(91,220,245,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ============================================================
       SHARED COMPONENTS
    ============================================================ */
    .btn {
      font-family: var(--font-h);
      font-weight: 700; font-size: 13px;
      letter-spacing: .5px;
      padding: 12px 24px;
      border-radius: var(--r);
      border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-accent  { background: var(--accent);  color: #fff; }
    .btn-accent:hover:not(:disabled)  { background: #4558e0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(91,110,245,0.35); }
    .btn-accent2 { background: var(--accent2); color: #fff; }
    .btn-accent2:hover:not(:disabled) { background: #d4477a; transform: translateY(-1px); }
    .btn-ghost   { background: #fff; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .btn-danger  { background: transparent; border: 1.5px solid var(--danger); color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: rgba(240,64,64,.08); }
    .btn-stop    { background: transparent; border: 1.5px solid var(--danger); color: var(--danger); flex:1; }
    .btn-stop:hover:not(:disabled) { background: rgba(240,64,64,.08); transform: translateY(-1px); }

    input, textarea, select {
      font-family: var(--font-m);
      background: #f7f8ff;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,110,245,0.12);
      background: #fff;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }

    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff;
      font-family: var(--font-h); font-weight: 700; font-size: 13px;
      padding: 12px 24px; border-radius: 100px;
      opacity: 0; pointer-events: none;
      transition: all .3s ease; z-index: 9999;
      box-shadow: 0 4px 20px rgba(91,110,245,0.35);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); box-shadow: 0 4px 20px rgba(240,64,64,0.3); }
    .toast.success { background: var(--success); color: #fff; box-shadow: 0 4px 20px rgba(34,201,122,0.3); }

    /* ============================================================
       PAGE VIEWS  (login / signup / app)
    ============================================================ */
    .view { display: none; position: relative; z-index: 1; }
    .view.active { display: block; }

    /* ============================================================
       AUTH PAGES  (login + signup share this layout)
    ============================================================ */
    .auth-wrapper {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(255,255,255,0.82);
      border: 1.5px solid rgba(91,110,245,0.13);
      border-radius: var(--rl);
      padding: 48px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 48px rgba(91,110,245,0.13), 0 2px 8px rgba(0,0,0,0.06);
      backdrop-filter: blur(16px);
    }

    .auth-logo {
      text-align: center; margin-bottom: 36px;
    }
    .auth-logo .brand {
      font-family: var(--font-h); font-size: 36px;
      font-weight: 800; letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .auth-logo .tagline {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted);
      margin-top: 4px;
    }

    .auth-title {
      font-family: var(--font-h); font-size: 20px;
      font-weight: 700; margin-bottom: 24px;
      color: var(--text);
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 16px; font-size: 14px;
    }

    /* Password field with show/hide toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      padding: 4px; line-height: 0;
      transition: color .2s;
    }
    .pw-toggle:hover { color: var(--accent); }

    .auth-submit {
      width: 100%; justify-content: center;
      margin-top: 8px; font-size: 15px; padding: 14px;
    }

    .auth-switch {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .auth-switch a {
      color: var(--accent); text-decoration: none;
      font-weight: 600;
    }
    .auth-switch a:hover { text-decoration: underline; }

    .field-error {
      font-size: 12px; color: var(--danger);
      margin-top: 6px; display: none;
    }
    .field-error.show { display: block; }

    /* strength bar */
    .strength-bar {
      height: 4px; border-radius: 4px;
      background: var(--border); margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%; width: 0;
      border-radius: 4px;
      transition: width .3s, background .3s;
    }

    /* ============================================================
       MAIN APP
    ============================================================ */
    .app-wrapper {
      max-width: 900px; margin: 0 auto;
      padding: 32px 20px 80px;
      position: relative; z-index: 1;
    }

    /* Header */
    header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 40px; padding-bottom: 20px;
      border-bottom: 1.5px solid rgba(91,110,245,0.15);
      flex-wrap: wrap; gap: 12px;
    }
    .logo-name {
      font-family: var(--font-h); font-size: 26px;
      font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }

    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .user-pill {
      background: linear-gradient(135deg, rgba(91,110,245,0.1), rgba(232,91,138,0.08));
      border: 1.5px solid rgba(91,110,245,0.2);
      border-radius: 100px; padding: 6px 14px;
      font-size: 13px; color: var(--accent);
      display: flex; align-items: center; gap: 6px;
    }

    .notes-counter {
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 100px; padding: 6px 16px;
      font-size: 12px; color: var(--muted); letter-spacing: 1px;
    }
    .notes-counter span { color: var(--accent); font-weight: 600; }

    .btn-logout {
      font-family: var(--font-h); font-size: 12px;
      font-weight: 700; letter-spacing: .5px;
      padding: 7px 16px; border-radius: 100px;
      background: #fff; border: 1.5px solid var(--border);
      color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); background: rgba(240,64,64,.05); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: var(--r); padding: 4px;
      margin-bottom: 32px; width: fit-content;
      box-shadow: 0 2px 8px rgba(91,110,245,0.08);
    }
    .tab-btn {
      font-family: var(--font-h); font-size: 13px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 10px 24px; border-radius: 8px;
      border: none; cursor: pointer;
      background: transparent; color: var(--muted);
      transition: all .2s ease;
    }
    .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(91,110,245,0.3); }
    .tab-btn:hover:not(.active) { color: var(--accent); background: rgba(91,110,245,0.06); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── RECORDER CARD ── */
    .recorder-card {
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(91,110,245,0.13);
      border-radius: var(--rl); padding: 40px;
      box-shadow: 0 4px 32px rgba(91,110,245,0.10), 0 1px 4px rgba(0,0,0,0.05);
      backdrop-filter: blur(12px);
    }

    /* Language selector row */
    .lang-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .lang-row label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap;
    }
    #langSelect {
      flex: 1; padding: 10px 14px; font-size: 13px;
      min-width: 180px; cursor: pointer;
    }
    #langSelect option { background: #fff; color: var(--text); }

    .auto-detect-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
      cursor: pointer; white-space: nowrap;
    }
    .auto-detect-toggle input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer;
      accent-color: var(--accent);
    }

    .mic-ring {
      width: 110px; height: 110px; border-radius: 50%;
      border: 2px solid var(--border);
      background: linear-gradient(135deg, rgba(91,110,245,0.06), rgba(232,91,138,0.04));
      display: flex; align-items: center; justify-content: center;
      transition: border-color .3s, box-shadow .3s;
    }
    .mic-ring.recording {
      border-color: var(--danger);
      animation: pulse-ring 1.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(240,64,64,.3); }
      50%      { box-shadow: 0 0 0 18px rgba(240,64,64,0); }
    }
    .mic-icon { width: 44px; height: 44px; color: var(--accent); transition: color .3s; }
    .mic-ring.recording .mic-icon { color: var(--danger); }

    .waveform {
      display: flex; align-items: center; gap: 3px;
      height: 32px; margin-top: 18px;
      opacity: 0; transition: opacity .3s;
    }
    .waveform.active { opacity: 1; }
    .wave-bar {
      width: 4px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 4px;
      animation: wave .8s ease-in-out infinite;
    }
    .wave-bar:nth-child(1)  { height: 8px;  animation-delay: .00s; }
    .wave-bar:nth-child(2)  { height: 18px; animation-delay: .10s; }
    .wave-bar:nth-child(3)  { height: 28px; animation-delay: .20s; }
    .wave-bar:nth-child(4)  { height: 14px; animation-delay: .30s; }
    .wave-bar:nth-child(5)  { height: 32px; animation-delay: .15s; }
    .wave-bar:nth-child(6)  { height: 20px; animation-delay: .25s; }
    .wave-bar:nth-child(7)  { height: 10px; animation-delay: .05s; }
    .wave-bar:nth-child(8)  { height: 24px; animation-delay: .35s; }
    .wave-bar:nth-child(9)  { height: 16px; animation-delay: .10s; }
    .wave-bar:nth-child(10) { height: 6px;  animation-delay: .20s; }
    @keyframes wave {
      0%,100% { transform: scaleY(1); }
      50%      { transform: scaleY(.35); }
    }

    .status-label {
      margin-top: 10px; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); min-height: 18px;
      transition: color .3s; text-align: center;
    }
    .status-label.recording { color: var(--danger); }

    /* Controls */
    .controls {
      display: flex; gap: 12px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), #7b5cf0); color: #fff; flex: 1;
      box-shadow: 0 4px 14px rgba(91,110,245,0.3);
    }
    .btn-start:hover:not(:disabled) { background: linear-gradient(135deg, #4558e0, #6a4de0); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(91,110,245,0.4); }

    .transcript-label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    #transcript {
      width: 100%; min-height: 150px; padding: 16px;
      font-size: 15px; line-height: 1.7; resize: vertical;
    }

    /* Detected language badge */
    #detectedLang {
      font-size: 11px; color: var(--accent);
      letter-spacing: 1px; margin-top: 6px;
      min-height: 16px;
    }

    .save-row {
      display: flex; align-items: center;
      gap: 12px; margin-top: 16px; flex-wrap: wrap;
    }
    .note-title-input {
      flex: 1; padding: 12px 16px; font-size: 14px; min-width: 160px;
    }
    .btn-save-note {
      background: linear-gradient(135deg, var(--accent2), #c4437a);
      color: #fff; padding: 12px 28px;
      box-shadow: 0 4px 14px rgba(232,91,138,0.3);
    }
    .btn-save-note:hover:not(:disabled) { background: linear-gradient(135deg, #d4477a, #b03a6a); transform: translateY(-1px); }

    /* ── NOTES PANEL ── */
    .notes-toolbar {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; padding: 10px 16px;
      font-size: 13px; min-width: 160px;
    }

    .notes-list { display: flex; flex-direction: column; gap: 14px; }

    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .empty-state svg { width: 52px; height: 52px; margin-bottom: 14px; opacity: .3; }
    .empty-state p { font-size: 14px; letter-spacing: 1px; }

    .note-card {
      background: rgba(255,255,255,0.88);
      border: 1.5px solid rgba(91,110,245,0.12);
      border-radius: var(--rl); padding: 24px;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      animation: slide-in .3s ease;
      box-shadow: 0 2px 12px rgba(91,110,245,0.07);
      backdrop-filter: blur(8px);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .note-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(91,110,245,0.14); }

    .note-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 10px; gap: 12px;
    }
    .note-title-txt {
      font-family: var(--font-h); font-weight: 700;
      font-size: 17px; flex: 1; word-break: break-word; color: var(--text);
    }
    .note-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px; flex-shrink: 0;
    }
    .note-date { font-size: 11px; color: var(--muted); letter-spacing: 1px; white-space: nowrap; }
    .note-lang-badge {
      font-size: 10px;
      background: linear-gradient(135deg, rgba(91,110,245,0.1), rgba(232,91,138,0.08));
      border: 1px solid rgba(91,110,245,0.2); border-radius: 100px;
      padding: 2px 10px; color: var(--accent); white-space: nowrap;
    }

    .note-body {
      font-size: 14px; line-height: 1.75;
      color: #5a6080; margin-bottom: 14px;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }
    .note-body.expanded { -webkit-line-clamp: unset; }

    .note-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm { font-size: 11px; padding: 7px 14px; border-radius: 8px; letter-spacing: .5px; }
    .btn-outline { background: #f7f8ff; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(91,110,245,0.06); }
    .btn-del { background: transparent; border: 1px solid transparent; color: var(--muted); }
    .btn-del:hover:not(:disabled) { border-color: var(--danger); color: var(--danger); background: rgba(240,64,64,0.05); }

    /* Inline edit */
    .note-edit-area {
      width: 100%; min-height: 120px;
      border-color: var(--accent) !important;
      padding: 12px; font-size: 14px;
      line-height: 1.7; resize: vertical; margin-bottom: 10px;
    }
    .note-title-edit {
      width: 100%; padding: 8px 12px;
      font-family: var(--font-h); font-size: 17px;
      font-weight: 700; border-color: var(--accent) !important;
      margin-bottom: 10px;
    }
    .btn-save-edit {
      background: linear-gradient(135deg, var(--accent), #7b5cf0); color: #fff;
      padding: 8px 20px; border-radius: 8px; border: none;
      font-family: var(--font-h); font-weight: 700;
      font-size: 12px; cursor: pointer; transition: opacity .2s;
    }
    .btn-save-edit:hover { opacity: .85; }
    .btn-cancel-edit {
      background: #f7f8ff; border: 1px solid var(--border);
      color: var(--muted); padding: 8px 16px; border-radius: 8px;
      font-family: var(--font-h); font-size: 12px;
      cursor: pointer; transition: color .2s;
    }
    .btn-cancel-edit:hover { color: var(--text); border-color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .recorder-card { padding: 24px 16px; }
      .controls { flex-direction: column; }
      .btn-start, .btn-stop { flex: unset; width: 100%; justify-content: center; }
      .save-row { flex-direction: column; align-items: stretch; }
      .auth-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     TOAST
============================================================ -->
<div class="toast" id="toast"></div>

<!-- ============================================================
     VIEW 1 — LOGIN
============================================================ -->
<div class="view active" id="viewLogin">
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="brand">VoxNote</div>
        <div class="tagline">Voice Based Notes</div>
      </div>

      <div class="auth-title">Welcome back</div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username"/>
        <div class="field-error" id="loginUserErr">Please enter your username.</div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password"/>
          <button class="pw-toggle" type="button" onclick="togglePw('loginPass', this)" title="Show/hide password">
            <!-- Eye icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="field-error" id="loginPassErr">Please enter your password.</div>
      </div>

      <div class="field-error" id="loginErr" style="margin-top:4px;"></div>

      <button class="btn btn-accent auth-submit" onclick="handleLogin()">Sign In</button>

      <div class="auth-switch">
        Don't have an account? <a href="#" onclick="showView('viewSignup')">Create one</a>
      </div>

    </div>
  </div>
</div>

<!-- ============================================================
     VIEW 2 — SIGN UP
============================================================ -->
<div class="view" id="viewSignup">
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="brand">VoxNote</div>
        <div class="tagline">Create Account</div>
      </div>

      <div class="auth-title">Get started</div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="signupUser" placeholder="Choose a username" autocomplete="username"
               oninput="clearFieldErr('signupUserErr')"/>
        <div class="field-error" id="signupUserErr"></div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="signupPass" placeholder="Choose a password"
                 autocomplete="new-password" oninput="checkStrength()"/>
          <button class="pw-toggle" type="button" onclick="togglePw('signupPass', this)" title="Show/hide">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Password strength bar -->
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="field-error" id="signupPassErr"></div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="signupConf" placeholder="Repeat your password"
                 autocomplete="new-password" oninput="clearFieldErr('signupConfErr')"/>
          <button class="pw-toggle" type="button" onclick="togglePw('signupConf', this)" title="Show/hide">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>

      <button class="btn btn-accent auth-submit" onclick="handleSignup()">Create Account</button>

<!-- ============================================================
     VIEW 3 — MAIN APP
============================================================ -->
<div class="view" id="viewApp">
<div class="app-wrapper">

  <!-- Header -->
  <header>
    <div>
      <div class="logo-name">VoxNote</div>
      <div class="logo-sub">Voice Based Notes</div>
    </div>
    <div class="header-right">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabRecord" onclick="switchTab('record')">🎙 Record</button>

  <!-- ── RECORDER PANEL ── -->
  <div class="panel active" id="panelRecord">
    <div class="recorder-card">

      <!-- Language selector -->
      <div class="lang-row">
        <label>🌐 Language</label>
        <select id="langSelect">
          <!-- Populated by JS -->
        </select>
        <label class="auto-detect-toggle">
          <input type="checkbox" id="autoDetect" onchange="toggleAutoDetect()"/>
          Auto-detect
        </label>
      </div>

      <!-- Mic + waveform -->
      <div class="mic-stage">
        <div class="mic-ring" id="micRing">
          <svg class="mic-icon" id="micIcon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <div class="waveform" id="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        <p class="status-label" id="statusLabel">Ready to record</p>
      </div>

      <!-- Buttons -->
      <div class="controls">
        <button class="btn btn-start" id="btnStart" onclick="startRecording()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
          Start Recording
        </button>
        <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop Recording
        </button>
        <button class="btn btn-ghost" onclick="clearTranscript()">Clear</button>
      </div>

      <!-- Transcript -->
      <p class="transcript-label">Transcript — edit before saving</p>
      <textarea id="transcript" placeholder="Your speech will appear here…"></textarea>
      <div id="detectedLang"></div>

      <!-- Save row -->
      <div class="save-row">
        <input class="note-title-input" id="noteTitle" type="text"
               placeholder="Note title (optional)" maxlength="80"/>
        <button class="btn btn-save-note" onclick="saveNote()">Save Note</button>
      </div>

    </div>
  </div><!-- /panelRecord -->

  <!-- ── NOTES PANEL ── -->
  <div class="panel" id="panelNotes">
    <div class="notes-toolbar">
      <input class="search-input" id="searchInput" type="text"
             placeholder="Search notes…" oninput="renderNotes()"/>
      <button class="btn btn-danger btn-sm" onclick="clearAllNotes()">Delete All</button>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

</div>
</div><!-- /viewApp -->

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
/* ──────────────────────────────────────────────────────────
   CONSTANTS
────────────────────────────────────────────────────────── */
const USERS_KEY   = 'voxnote_users';    // Stores all registered users
const SESSION_KEY = 'voxnote_session';  // Stores current logged-in username
const NOTES_KEY   = (user) => `voxnote_notes_${user}`; // Per-user notes key

/* ──────────────────────────────────────────────────────────
   SUPPORTED LANGUAGES
   Each entry: { code: BCP-47 tag, name: display label }
────────────────────────────────────────────────────────── */
const LANGUAGES = [
  { code: 'en-US',  name: '🇺🇸 English' },
  { code: 'hi-IN',  name: '🇮🇳 Hindi' },
  { code: 'te-IN',  name: '🇮🇳 Telugu' },
];

/* ──────────────────────────────────────────────────────────
   SPEECH STATE
────────────────────────────────────────────────────────── */
let recognition    = null;
let isRecording    = false;
let lastDetected   = '';  // Language detected by browser during last session

/* ──────────────────────────────────────────────────────────
   DOM REFS
────────────────────────────────────────────────────────── */
const $transcript   = () => document.getElementById('transcript');
const $micRing      = () => document.getElementById('micRing');
const $waveform     = () => document.getElementById('waveform');
const $statusLabel  = () => document.getElementById('statusLabel');
const $btnStart     = () => document.getElementById('btnStart');
const $btnStop      = () => document.getElementById('btnStop');
const $noteTitle    = () => document.getElementById('noteTitle');
const $notesList    = () => document.getElementById('notesList');
const $noteCount    = () => document.getElementById('noteCount');
const $langSelect   = () => document.getElementById('langSelect');
const $autoDetect   = () => document.getElementById('autoDetect');
const $detectedLang = () => document.getElementById('detectedLang');
const $toast        = () => document.getElementById('toast');

/* ══════════════════════════════════════════════════════════
   1. VIEW ROUTING
══════════════════════════════════════════════════════════ */

/** Show one view, hide others */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════════════════════════════
   2. AUTH HELPERS
══════════════════════════════════════════════════════════ */

/** loadUsers — returns object { username: hashedPassword } */
function loadUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
}

/** saveUsers — persists users object */
function saveUsers(obj) { localStorage.setItem(USERS_KEY, JSON.stringify(obj)); }

/**
 * simpleHash — lightweight string hash (NOT cryptographic).
 * Sufficient for a local-only demo app; replace with bcrypt on a real server.
 */
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0; // 32-bit int
  }
  return hash.toString(36);
}

/** currentUser — returns logged-in username from session, or null */
function currentUser() {
  return localStorage.getItem(SESSION_KEY) || null;
}

/* ── LOGIN ── */
function handleLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;

  // Clear old errors
  hideErr('loginUserErr'); hideErr('loginPassErr'); hideErr('loginErr');

  let ok = true;
  if (!user) { showErr('loginUserErr', 'Please enter your username.'); ok = false; }
  if (!pass) { showErr('loginPassErr', 'Please enter your password.'); ok = false; }
  if (!ok) return;

  const users = loadUsers();
  if (!users[user] || users[user] !== simpleHash(pass)) {
    showErr('loginErr', '⚠ Incorrect username or password.');
    return;
  }

  // Store session
  localStorage.setItem(SESSION_KEY, user);
  enterApp(user);
}

/* ── SIGN UP ── */
function handleSignup() {
  const user = document.getElementById('signupUser').value.trim();
  const pass = document.getElementById('signupPass').value;
  const conf = document.getElementById('signupConf').value;

  hideErr('signupUserErr'); hideErr('signupPassErr'); hideErr('signupConfErr');

  let ok = true;
  if (!user || user.length < 3) { showErr('signupUserErr', 'Username must be at least 3 characters.'); ok = false; }
  if (!pass || pass.length < 6) { showErr('signupPassErr', 'Password must be at least 6 characters.'); ok = false; }
  if (pass !== conf)            { showErr('signupConfErr', 'Passwords do not match.'); ok = false; }
  if (!ok) return;

  const users = loadUsers();
  if (users[user]) { showErr('signupUserErr', 'Username already taken.'); return; }

  // Register new user
  users[user] = simpleHash(pass);
  saveUsers(users);
  localStorage.setItem(SESSION_KEY, user);

  enterApp(user);
  showToast('Account created! Welcome 🎉', 'success');
}

/* ── LOGOUT ── */
function handleLogout() {
  if (isRecording) stopRecording();
  localStorage.removeItem(SESSION_KEY);
  // Reset login form
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  showView('viewLogin');
}

/* ── ENTER APP ── */
function enterApp(user) {
  document.getElementById('headerUser').textContent = user;
  updateCounter();
  populateLangDropdown();
  switchTab('record');
  showView('viewApp');
}

/* ── FIELD ERROR HELPERS ── */
function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}
function hideErr(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('show');
}
function clearFieldErr(id) { hideErr(id); }

/* ── PASSWORD VISIBILITY TOGGLE ── */
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  // Swap icon fill colour as a hint
  btn.style.color = isHidden ? 'var(--accent)' : 'var(--muted)';
}

/* ── PASSWORD STRENGTH INDICATOR ── */
function checkStrength() {
  const pass  = document.getElementById('signupPass').value;
  const fill  = document.getElementById('strengthFill');
  const score = [/.{8,}/, /[A-Z]/, /[0-9]/, /[^A-Za-z0-9]/]
                  .filter(r => r.test(pass)).length;

  const map = ['0%','30%','55%','80%','100%'];
  const col = ['#ff4747','#ff9147','#e8ff47','#47ffe8','#47ff8a'];
  fill.style.width      = map[score];
  fill.style.background = col[score];
}

/* ══════════════════════════════════════════════════════════
   3. LANGUAGE SETUP
══════════════════════════════════════════════════════════ */

/** populateLangDropdown — fills the <select> with LANGUAGES list */
function populateLangDropdown() {
  const sel = $langSelect();
  if (!sel || sel.options.length > 0) return; // already populated
  LANGUAGES.forEach(lang => {
    const opt   = document.createElement('option');
    opt.value   = lang.code;
    opt.textContent = lang.name;
    sel.appendChild(opt);
  });
  // Default to browser's language if it exists in our list
  const browserLang = navigator.language || 'en-US';
  const match = LANGUAGES.find(l => l.code === browserLang || l.code.startsWith(browserLang.split('-')[0]));
  if (match) sel.value = match.code;
}

/** toggleAutoDetect — disables dropdown when auto-detect is on */
function toggleAutoDetect() {
  $langSelect().disabled = $autoDetect().checked;
}

/** getActiveLang — returns the language code to use for recognition */
function getActiveLang() {
  if ($autoDetect().checked) return ''; // empty = let browser decide
  return $langSelect().value || 'en-US';
}

/* ══════════════════════════════════════════════════════════
   4. SPEECH RECOGNITION
══════════════════════════════════════════════════════════ */

/** initRecognition — creates a configured SpeechRecognition instance */
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Speech API not supported in this browser.', 'error');
    return false;
  }

  recognition = new SR();
  recognition.continuous     = true;   // Keep listening
  recognition.interimResults = true;   // Stream partial text
  recognition.lang           = getActiveLang(); // '' = auto-detect

  recognition.onresult = (e) => {
    let final   = '';
    let interim = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        final += t + ' ';
        // Try to read detected language from result (Chrome sometimes exposes it)
        if (e.results[i][0].lang) {
          lastDetected = e.results[i][0].lang;
          showDetectedLang(lastDetected);
        }
      } else {
        interim += t;
      }
    }

    if (final) $transcript().value += final;
    if (interim && isRecording) {
      $statusLabel().textContent = `Hearing: "${interim.slice(0, 50)}…"`;
    }
  };

  // Auto-restart if browser stops recognition mid-session
  recognition.onend = () => {
    if (isRecording) recognition.start();
  };

  recognition.onerror = (e) => {
    if (e.error !== 'aborted') {
      showToast(`Mic error: ${e.error}`, 'error');
      setRecordingState(false);
    }
  };

  return true;
}

function startRecording() {
  if (!initRecognition()) return;
  lastDetected = '';
  $detectedLang().textContent = '';
  isRecording = true;
  recognition.start();
  setRecordingState(true);
}

function stopRecording() {
  if (!recognition) return;
  isRecording = false;
  recognition.stop();
  setRecordingState(false);
}

function setRecordingState(on) {
  $btnStart().disabled = on;
  $btnStop().disabled  = !on;
  $micRing().classList.toggle('recording', on);
  $waveform().classList.toggle('active', on);
  $statusLabel().classList.toggle('recording', on);
  $statusLabel().textContent = on ? 'Recording…' : 'Ready to record';
  $langSelect().disabled = on || $autoDetect().checked;
}

function clearTranscript() {
  $transcript().value = '';
  $detectedLang().textContent = '';
  if (!isRecording) $statusLabel().textContent = 'Ready to record';
}

/** showDetectedLang — displays the browser-detected language code */
function showDetectedLang(code) {
  const match = LANGUAGES.find(l => l.code === code);
  const label = match ? match.name : code;
  $detectedLang().textContent = `Detected: ${label}`;
}

/* ══════════════════════════════════════════════════════════
   5. NOTES — LocalStorage (per user)
══════════════════════════════════════════════════════════ */

function loadNotes() {
  const user = currentUser(); if (!user) return [];
  try { return JSON.parse(localStorage.getItem(NOTES_KEY(user))) || []; } catch { return []; }
}

function persistNotes(notes) {
  const user = currentUser(); if (!user) return;
  localStorage.setItem(NOTES_KEY(user), JSON.stringify(notes));
  $noteCount().textContent = notes.length;
}

/* ── SAVE NEW NOTE ── */
function saveNote() {
  const content = $transcript().value.trim();
  if (!content) { showToast('Nothing to save!', 'error'); return; }

  const now    = new Date();
  const lang   = lastDetected || ($autoDetect().checked ? 'auto' : getActiveLang());
  const langName = LANGUAGES.find(l => l.code === lang)?.name || lang;

  const note = {
    id:       Date.now(),
    title:    $noteTitle().value.trim() || 'Note — ' + formatDate(now),
    content:  content,
    date:     now.toISOString(),
    dateStr:  formatDate(now),
    lang:     lang,
    langName: langName
  };

  const notes = loadNotes();
  notes.unshift(note);
  persistNotes(notes);

  $transcript().value = '';
  $noteTitle().value  = '';
  lastDetected = '';
  $detectedLang().textContent = '';

  showToast('Note saved! ✓', 'success');
  updateCounter();
}

/* ── RENDER NOTES ── */
function renderNotes() {
  const notes   = loadNotes();
  const query   = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const filtered = query
    ? notes.filter(n =>
        n.title.toLowerCase().includes(query) ||
        n.content.toLowerCase().includes(query) ||
        (n.langName || '').toLowerCase().includes(query))
    : notes;

  $notesList().innerHTML = '';

  if (filtered.length === 0) {
    $notesList().innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
        <p>${query ? 'No notes match your search.' : 'No notes yet. Record something!'}</p>
      </div>`;
    return;
  }

  filtered.forEach(note => {
    const card = document.createElement('div');
    card.className = 'note-card';
    card.id        = `note-${note.id}`;
    card.innerHTML = buildCardHTML(note);
    $notesList().appendChild(card);
  });
}

function buildCardHTML(note) {
  const sT = escapeHTML(note.title);
  const sC = escapeHTML(note.content);
  const langBadge = note.langName
    ? `<span class="note-lang-badge">${escapeHTML(note.langName)}</span>` : '';

  return `
    <div class="note-card-header">
      <span class="note-title-txt">${sT}</span>
      <div class="note-meta">
        <span class="note-date">${note.dateStr}</span>
        ${langBadge}
      </div>
    </div>
    <div class="note-body" id="body-${note.id}">${sC}</div>
    <div class="note-actions">
      <button class="btn btn-sm btn-outline" onclick="toggleExpand(${note.id})">Expand</button>
      <button class="btn btn-sm btn-outline" onclick="startEdit(${note.id})">Edit</button>
      <button class="btn btn-sm btn-outline" onclick="copyNote(${note.id})">Copy</button>
      <button class="btn btn-sm btn-del"     onclick="deleteNote(${note.id})">Delete</button>
    </div>`;
}

/* ── NOTE ACTIONS ── */
function toggleExpand(id) {
  document.getElementById(`body-${id}`)?.classList.toggle('expanded');
}

function startEdit(id) {
  const note = loadNotes().find(n => n.id === id);
  if (!note) return;
  const card = document.getElementById(`note-${id}`);
  if (!card) return;
  card.innerHTML = `
    <input class="note-title-edit" id="et-${id}" value="${escapeHTML(note.title)}" maxlength="80"/>
    <textarea class="note-edit-area" id="ec-${id}">${escapeHTML(note.content)}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn-save-edit"   onclick="saveEdit(${id})">Save</button>
      <button class="btn-cancel-edit" onclick="renderNotes()">Cancel</button>
    </div>`;
}

function saveEdit(id) {
  const newT = document.getElementById(`et-${id}`)?.value.trim();
  const newC = document.getElementById(`ec-${id}`)?.value.trim();
  if (!newC) { showToast('Note cannot be empty.', 'error'); return; }
  const notes = loadNotes();
  const idx   = notes.findIndex(n => n.id === id);
  if (idx === -1) return;
  notes[idx].title   = newT || notes[idx].title;
  notes[idx].content = newC;
  persistNotes(notes);
  renderNotes();
  showToast('Note updated!', 'success');
}

function copyNote(id) {
  const note = loadNotes().find(n => n.id === id);
  if (!note) return;
  navigator.clipboard.writeText(note.content)
    .then(() => showToast('Copied!'))
    .catch(()  => showToast('Copy failed.', 'error'));
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  persistNotes(loadNotes().filter(n => n.id !== id));
  renderNotes();
  showToast('Note deleted.');
}

function clearAllNotes() {
  if (loadNotes().length === 0) { showToast('No notes to delete.', 'error'); return; }
  if (!confirm('Delete ALL your notes? This cannot be undone.')) return;
  persistNotes([]);
  renderNotes();
  showToast('All notes deleted.');
}

/* ══════════════════════════════════════════════════════════
   6. TAB SWITCHING
══════════════════════════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel' + (tab === 'record' ? 'Record' : 'Notes')).classList.add('active');
  document.getElementById('tab'   + (tab === 'record' ? 'Record' : 'Notes')).classList.add('active');
  if (tab === 'notes') renderNotes();
}

/* ══════════════════════════════════════════════════════════
   7. UTILITIES
══════════════════════════════════════════════════════════ */
function formatDate(d) {
  return d.toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

/** showToast — type: '' | 'error' | 'success' */
function showToast(msg, type = '') {
  const t = $toast();
  t.textContent = msg;
  t.className   = 'toast' + (type ? ' ' + type : '');
  requestAnimationFrame(() => {
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  });
}

function updateCounter() {
  const el = $noteCount();
  if (el) el.textContent = loadNotes().length;
}

/* ══════════════════════════════════════════════════════════
   8. BOOT — check for existing session on page load
══════════════════════════════════════════════════════════ */
(function boot() {
  const user = currentUser();
  if (user && loadUsers()[user]) {
    // Already logged in — go straight to app
    enterApp(user);
  } else {
    // Remove stale session if user was deleted
    localStorage.removeItem(SESSION_KEY);
    showView('viewLogin');
  }

  // Warn if Speech API unavailable
  if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) {
    const lbl = document.getElementById('statusLabel');
    if (lbl) {
      lbl.textContent = '⚠ Speech API not supported';
      document.getElementById('btnStart').disabled = true;
    }
  }
})();
</script>
</body>
